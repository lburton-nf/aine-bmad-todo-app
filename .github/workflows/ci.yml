name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint • test • docker • e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_VERSION: '20'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix client
          npm ci --prefix server

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests with coverage (80% thresholds)
        run: npm run test:coverage

      - name: Build server
        run: npm run build --prefix server

      - name: Build client
        run: npm run build --prefix client

      - name: Build Docker image
        run: docker build -t todo-app-3 .

      - name: Docker integration test (NFR-6 / FR12 persistence across docker rm)
        run: npm run test:docker

      - name: Install Playwright browsers
        run: |
          npm ci  # ensure root playwright is on PATH
          npx playwright install --with-deps

      - name: Dev e2e (Chromium against Vite + Fastify)
        run: npm run test:e2e

      - name: Production smoke (Chromium against the built Docker image)
        run: npm run test:e2e:docker

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            test-results-docker/
          retention-days: 7
